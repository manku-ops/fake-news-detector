<!DOCTYPE html>
<html>
<head>
    <title>AI Fake News Analyzer</title>
</head>
<body>

<h1>Fake News Detection System</h1>

<form method="POST" enctype="multipart/form-data">
    <textarea name="news" placeholder="Enter news text"></textarea><br><br>

    <input type="text" name="url" placeholder="Enter news URL"><br><br>

    <input type="file" name="image"><br><br>

    <button type="submit">Analyze</button>
</form>

{% if result %}
    <h2>Results:</h2>

    {% if result.text %}
        <p>Text: {{ result.text.label }} ({{ result.text.confidence }}%)</p>
    {% endif %}

    {% if result.url %}
        <p>Source: {{ result.url }}</p>
    {% endif %}

    {% if result.image %}
        <p>Image: {{ result.image }}</p>
    {% endif %}
{% endif %}

</body>
</html>
